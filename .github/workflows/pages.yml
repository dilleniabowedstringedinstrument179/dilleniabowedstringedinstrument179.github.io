name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A28EDD: ${{ secrets.A28EDD }}
          B94BE1: ${{ secrets.B94BE1 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A28EDD', '')
          tag_b = os.environ.get('B94BE1', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- fa193f07066bdacbe73dc5a023be -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- cc0b253c3b93243eda8ba57a11d5 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
